name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/healthz && break
            echo "waiting... ($i)"
            sleep 3
          done
      - name: Run migrations
        run: docker compose exec -T api alembic upgrade head
      - name: Check /readyz (DB connected)
        run: curl -sf http://localhost:8000/readyz
      - name: Tear down
        if: always()
        run: docker compose down
